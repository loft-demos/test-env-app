apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: flux-kargo-cluster-config
  namespace: p-vcluster-flux-demo
spec:
  dependsOn:
    - name: flux-kargo-install
      namespace: p-vcluster-flux-demo
    - name: flux-kargo-cluster-secrets
      namespace: p-vcluster-flux-demo
  interval: 10m
  retryInterval: 1m
  timeout: 5m
  prune: true
  wait: true
  sourceRef:
    kind: GitRepository
    name: vcluster-flux-demo-kargo
    namespace: p-vcluster-flux-demo
  path: ./vcluster-use-cases/flux/host-apps/kargo/cluster/config
  healthCheckExprs:
    - apiVersion: kargo.akuity.io/v1alpha1
      kind: ClusterConfig
      inProgress: "!status.conditions.exists(c, c.type == 'Ready' && c.status == 'True')"
      current: "status.conditions.exists(c, c.type == 'Ready' && c.status == 'True')"
