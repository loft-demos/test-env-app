apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: virtual-scheduler-manifests
  namespace: argocd
  labels:
    use-case.demos.vcluster.com: virtual-scheduler
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: 'https://github.com/loft-demos/test-env-app'
    targetRevision: 'main'
    path: vcluster-use-cases/virtual-scheduler/manifests
  destination:
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      prune: true
      selfHeal: true    
    retry:
      limit: 5
      backoff:
        duration: 5s 
        factor: 2 
        maxDuration: 1m
