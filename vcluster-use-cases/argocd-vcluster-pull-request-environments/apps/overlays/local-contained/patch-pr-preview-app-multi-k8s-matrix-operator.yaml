apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: pr-app-multi-k8s
  namespace: argocd
spec:
  generators:
    - matrix:
        generators:
          - pullRequest:
              gitea:
                owner: loft-demos
                repo: test-env-app
                api: "https://github.com"
                tokenRef:
                  secretName: loft-demo-org-cred
                  key: token
              requeueAfterSeconds: 86400
          - clusters:
              selector:
                matchExpressions:
                  - key: prNumber
                    operator: In
                    values:
                      - '{{number}}'
                matchLabels:
                  prLabel: deploy-argocd-vcluster-preview
                  repo: test-env-app
  template:
    spec:
      info:
        - name: Pull Request
          value: 'https://github.com/loft-demos/{{metadata.labels.repo}}/pulls/{{number}}'
      source:
        helm:
          parameters:
            - name: image.repository
              value: 'ghcr.io/loft-demos/{{metadata.labels.repo}}-demo-app'
            - name: image.tag
              value: '{{head_short_sha}}'
            - name: image.args.text
              value: >-
                Hello from {{metadata.labels.vclusterName}} commit
                {{head_short_sha}}
            - name: ingress.hosts[0].host
              value: '{{metadata.labels.vclusterName}}.us.demo.dev'
            - name: ingress.hosts[0].paths[0].backend.service.name
              value: '{{metadata.labels.repo}}'
            - name: ingress.hosts[0].paths[0].backend.service.port.name
              value: http
            - name: ingress.hosts[0].paths[0].path
              value: /
            - name: ingress.hosts[0].paths[0].pathType
              value: prefix
            - name: ingress.tls[0].hosts[0]
              value: '{{metadata.labels.vclusterName}}.us.demo.dev'
        repoURL: 'https://github.com/loft-demos/{{metadata.labels.repo}}.git'
        targetRevision: '{{head_sha}}'
