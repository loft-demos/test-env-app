apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: auto-nodes-aws-cluster
  namespace: argocd
spec:
  generators:
    - clusters:
        selector:
          matchLabels:
            autoNodesAWS: 'true'
  template:
    metadata:
      name: auto-nodes-aws-apps
      labels:
        use-case.demos.vcluster.com: auto-nodes-aws
    spec:
      destination:
        server: '{{server}}'
        namespace: argocd
      project: default
      source:
        repoURL: 'https://github.com/loft-demos/test-env-app'
        targetRevision: 'main'
        path: vcluster-use-cases/auto-nodes-aws/apps
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - Replace=true
        retry:
          limit: 5
          backoff:
            duration: 20s
            factor: 2
            maxDuration: 3m
